name: Build & Release ZerDisguise

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Plugin
        run: ./gradlew :shaded:shadowJar --no-daemon

      - name: Listar JARs generados
        run: find shaded/build/libs -name "*.jar" | sort

      - name: Encontrar JAR compilado
        id: find_jar
        run: |
          JAR_PATH=$(find shaded/build/libs -name "*.jar" | sort | tail -1)
          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "jar_name=$(basename $JAR_PATH)" >> $GITHUB_OUTPUT
          echo "JAR encontrado: $JAR_PATH"

      - name: Crear Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}-menu-gui"
          name: "ZerDisguise - Menú GUI Interactivo (Build ${{ github.run_number }})"
          body: |
            ## ZerDisguise con Menú GUI Interactivo

            ### Nuevas funciones añadidas:
            - `/disguisemenu` (`/dmenu`, `/disgmenu`) — Abre el menú principal con 54 slots
            - Menú de **Mobs** paginado (todos los tipos de disfraces de mob)
            - Menú de **Misceláneos** paginado
            - Menú de **Jugadores** (cabezas de jugadores en línea como ítems)
            - Menú de **Mi Disfraz** — ver y quitar el disfraz activo
            - Todas las acciones usan `performCommand()` sobre los comandos existentes

            ### Permiso requerido:
            - `libsdisguises.menu` — por defecto: op

            ### Instalación:
            1. Descarga el JAR adjunto
            2. Ponlo en tu carpeta `plugins/`
            3. Reinicia el servidor

            Basado en LibsDisguises v11.0.18
          files: ${{ steps.find_jar.outputs.jar_path }}
          draft: false
          prerelease: false
