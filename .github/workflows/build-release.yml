name: Build & Release ZerDisguise

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Plugin
        run: ./gradlew :shaded:shadowJar :shaded:compileShadedFiles --no-daemon

      - name: Renombrar JAR a ZerDisguise.jar
        id: find_jar
        run: |
          ORIG=$(find shaded/build/libs -name "*.jar" | sort | tail -1)
          cp "$ORIG" shaded/build/libs/ZerDisguise.jar
          echo "jar_path=shaded/build/libs/ZerDisguise.jar" >> $GITHUB_OUTPUT
          echo "JAR listo: $(du -sh shaded/build/libs/ZerDisguise.jar | cut -f1)"

      - name: Eliminar releases anteriores
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 20 --json tagName -q '.[].tagName' | \
          while read tag; do
            echo "Eliminando release: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Crear Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}-menu-gui"
          name: "ZerDisguise v${{ github.run_number }} â€” Menu GUI Interactivo"
          body: |
            ## ZerDisguise â€” Menu GUI Interactivo

            ### Que incluye esta version:
            - `/disguisemenu` â€” Abre el menu principal de disfraces
            - Menu de **Mobs** paginado (todos los tipos de mob)
            - Menu de **Jugadores** â€” online y **offline por nombre**
            - Menu de **Objetos/Misc** paginado
            - **Quitar disfraz** desde el menu principal (siempre visible)
            - **Jugador offline**: escribe el nombre en el chat tras hacer clic
            - Corregido error `IncompatibleClassChangeError` con `InventoryView` en Paper 1.20.4
            - Corregido: clics ahora funcionan gracias al scheduler de Bukkit

            ### Permiso requerido:
            - `libsdisguises.menu` â€” por defecto: op

            ### Instalacion:
            1. Descarga `ZerDisguise.jar`
            2. Coloca el archivo en la carpeta `plugins/`
            3. Reinicia el servidor
          files: ${{ steps.find_jar.outputs.jar_path }}
          draft: false
          prerelease: false

